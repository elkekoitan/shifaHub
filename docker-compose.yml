# ShifaHub Local Development Environment
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:17-alpine
    container_name: shifahub-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: shifahub
      POSTGRES_USER: shifahub
      POSTGRES_PASSWORD: shifahub_dev
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shifahub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: shifahub-redis-dev
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: shifahub-minio-dev
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: shifahub-qdrant-dev
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pg_data:
  redis_data:
  minio_data:
  qdrant_data:
